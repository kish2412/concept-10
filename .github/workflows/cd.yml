name: CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  migrate:
    name: Run production migrations
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Alembic migrations
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
        run: alembic upgrade head

  deploy_backend:
    name: Deploy backend (Railway)
    runs-on: ubuntu-latest
    needs: migrate

    steps:
      - name: Trigger Railway deploy hook
        run: curl -fsSL -X POST "${{ secrets.RAILWAY_DEPLOY_HOOK_URL }}"

  deploy_frontend:
    name: Deploy frontend (Vercel)
    runs-on: ubuntu-latest
    needs: deploy_backend

    steps:
      - name: Trigger Vercel deploy hook
        run: curl -fsSL -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}"

  smoke_tests:
    name: Production smoke tests
    runs-on: ubuntu-latest
    needs:
      - deploy_backend
      - deploy_frontend

    steps:
      - name: Wait for services to become ready
        run: sleep 20

      - name: Backend health check
        run: curl -fsSL "${{ secrets.BACKEND_HEALTHCHECK_URL }}"

      - name: Frontend health check
        run: curl -fsSL "${{ secrets.FRONTEND_URL }}"
