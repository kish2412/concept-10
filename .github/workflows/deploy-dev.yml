name: Deploy Dev

on:
  push:
    branches:
      - dev

jobs:
  lint_frontend:
    name: Lint frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Lint frontend
        run: npm run lint

  test_frontend:
    name: Test frontend
    runs-on: ubuntu-latest
    needs: lint_frontend
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Run frontend tests
        run: npm run test --if-present

  lint_backend:
    name: Lint backend (ruff)
    runs-on: ubuntu-latest
    needs: test_frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Run ruff
        run: ruff check app alembic

  test_backend:
    name: Test backend (pytest)
    runs-on: ubuntu-latest
    needs: lint_backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Run pytest
        run: pytest

  deploy_frontend_preview:
    name: Deploy frontend to Vercel preview
    runs-on: ubuntu-latest
    needs: test_backend
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Vercel CLI
        run: npm install --global vercel@latest
      - name: Pull Vercel environment (preview)
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      - name: Build preview artifact
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
      - name: Deploy preview artifact
        run: vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}

  deploy_backend_dev:
    name: Deploy backend to Railway dev service
    runs-on: ubuntu-latest
    needs: deploy_frontend_preview
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Deploy to Railway dev
        run: npx @railway/cli up --ci --environment dev
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  migrate_dev:
    name: Run alembic upgrade head (dev)
    runs-on: ubuntu-latest
    needs: deploy_backend_dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run migrations on dev database
        env:
          DATABASE_URL: ${{ secrets.DEV_DATABASE_URL }}
        run: alembic upgrade head
      - name: Dev backend health check
        run: curl -fsSL "${{ secrets.DEV_BACKEND_URL }}"
